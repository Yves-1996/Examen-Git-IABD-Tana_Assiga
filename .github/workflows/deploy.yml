name: Sync to Hugging Face
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Remplacer par votre nom d'utilisateur HF et le nom de votre Space
          git push --force https://Yves-Tana:$HF_TOKEN@huggingface.co/spaces/Yves-Tana/Examen-Git-IABD-Tana_Assiga main